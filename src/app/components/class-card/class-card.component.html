<div
  class="class-card"
  [ngClass]="{ dead: slot().isDead }"
  [ngStyle]="{ '--class-color': slot().gameClass.color }"
  (click)="onCardClick()"
  [attr.title]="slot().gameClass.name"
>
  <div class="card-image-wrapper">
    <img
      [src]="slot().gameClass.image"
      [alt]="slot().gameClass.name"
      class="card-image"
      draggable="false"
    />
    <!-- Dead overlay -->
    @if (slot().isDead) {
      <div class="dead-overlay">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="4" y1="4" x2="36" y2="36" stroke="crimson" stroke-width="4" stroke-linecap="round"/>
          <line x1="36" y1="4" x2="4" y2="36" stroke="crimson" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
    }
  </div>

  <span class="card-name">{{ slot().gameClass.name }}</span>

  @if (showRemove()) {
    <button class="remove-btn" (click)="onRemoveClick($event)" title="Retirer">✕</button>
  }
</div>
